<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onlineshop</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-gap: 20px;
            grid-auto-rows: minmax(300px, auto);
            justify-items: center;
            align-items: center;
        }
        .product-card {
            background: #f1f1f1;
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .product-card img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="grid-container" id="productGrid">
        <!-- Produktkarten werden hier dynamisch eingefügt -->
    </div>

    <!-- Modal für Bestellformular -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <form id="orderForm">
                <div class="form-group">
                    <label for="size">Größe:</label>
                    <select id="size" name="size" required>
                        <option value="">Bitte wählen</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                    <div id="sizeError" class="error-message">Bitte wählen Sie eine Größe</div>
                </div>
                <div class="form-group">
                    <label for="color">Farbe:</label>
                    <select id="color" name="color" required>
                        <option value="">Bitte wählen</option>
                        <option value="Schwarz">Schwarz</option>
                        <option value="Weiß">Weiß</option>
                        <option value="Blau">Blau</option>
                        <option value="Rot">Rot</option>
                    </select>
                    <div id="colorError" class="error-message">Bitte wählen Sie eine Farbe</div>
                </div>
                <div class="form-group">
                    <label>Geschlecht:</label>
                    <div>
                        <input type="radio" id="male" name="gender" value="Männlich" required>
                        <label for="male">Männlich</label>
                        <input type="radio" id="female" name="gender" value="Weiblich">
                        <label for="female">Weiblich</label>
                        <input type="radio" id="diverse" name="gender" value="Divers">
                        <label for="diverse">Divers</label>
                    </div>
                    <div id="genderError" class="error-message">Bitte wählen Sie ein Geschlecht</div>
                </div>
                <div class="form-group">
                    <label for="grade">Jahrgangsstufe:</label>
                    <select id="grade" name="grade" required>
                        <option value="">Bitte wählen</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="EF">EF</option>
                        <option value="Q1">Q1</option>
                        <option value="Q2">Q2</option>
                    </select>
                    <div id="gradeError" class="error-message">Bitte wählen Sie eine Jahrgangsstufe</div>
                </div>
                <div class="form-group">
                    <label for="class">Klassenbuchstabe:</label>
                    <select id="class" name="class" required>
                        <option value="">Bitte wählen</option>
                        <option value="a">a</option>
                        <option value="b">b</option>
                        <option value="c">c</option>
                        <option value="d">d</option>
                        <option value="e">e</option>
                    </select>
                    <div id="classError" class="error-message">Bitte wählen Sie einen Klassenbuchstaben</div>
                </div>
                <div class="form-group">
                    <label for="name">Voller Name:</label>
                    <input type="text" id="name" name="name" required minlength="3">
                    <div id="nameError" class="error-message">Bitte geben Sie einen Namen mit mindestens 3 Zeichen ein</div>
                </div>
                <div class="form-group">
                    <label for="email">E-Mail:</label>
                    <input type="email" id="email" name="email" required>
                    <div id="emailError" class="error-message">Bitte geben Sie eine gültige E-Mail-Adresse ein</div>
                </div>
                <button type="submit">Bestellung absenden</button>
            </form>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script>
        // Produktdaten
        const products = [
            {
                id: 1,
                name: "T-Shirt",
                price: 20.00,
                image: "https://via.placeholder.com/150",
                description: "Ein bequemes T-Shirt"
            },
            {
                id: 2,
                name: "Hoodie",
                price: 35.00,
                image: "https://via.placeholder.com/150",
                description: "Ein warmer Hoodie"
            },
            {
                id: 3,
                name: "Cap",
                price: 15.00,
                image: "https://via.placeholder.com/150",
                description: "Eine coole Cap"
            },
            {
                id: 4,
                name: "Jeans",
                price: 40.00,
                image: "https://via.placeholder.com/150",
                description: "Eine stylische Jeans"
            },
            {
                id: 5,
                name: "Sneakers",
                price: 50.00,
                image: "https://via.placeholder.com/150",
                description: "Bequeme Sneakers"
            }
        ];

        // Funktion zum Erstellen der Produktkarten
        function createProductCards() {
            const gridContainer = document.querySelector('.grid-container');

            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.setAttribute('data-id', product.id);

                const productImage = document.createElement('img');
                productImage.src = product.image;
                productImage.alt = product.name;

                const productName = document.createElement('h3');
                productName.textContent = product.name;

                const productPrice = document.createElement('p');
                productPrice.textContent = `$${product.price.toFixed(2)}`;

                productCard.appendChild(productImage);
                productCard.appendChild(productName);
                productCard.appendChild(productPrice);

                gridContainer.appendChild(productCard);
            });
        }

        // Erstellen der Produktkarten beim Laden der Seite
        document.addEventListener('DOMContentLoaded', createProductCards);

        // Modal öffnen
        function openModal(productId) {
            document.getElementById('orderModal').style.display = 'block';
            // Hier könnte man die Produktdaten in das Formular laden
        }

        // Modal schließen
        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        // Event-Listener für das Schließen des Modals
        document.querySelector('.close').addEventListener('click', closeModal);

        // Event-Listener für das Öffnen des Modals beim Klick auf eine Produktkarte
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', function() {
                const productId = this.getAttribute('data-id');
                openModal(productId);
            });
        });

        // Formularvalidierung
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();
            let isValid = true;

            // Validierung der Eingaben
            const size = document.getElementById('size').value;
            const color = document.getElementById('color').value;
            const gender = document.querySelector('input[name="gender"]\:checked');
            const grade = document.getElementById('grade').value;
            const classLetter = document.getElementById('class').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            if (!size) {
                document.getElementById('sizeError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('sizeError').style.display = 'none';
            }

            if (!color) {
                document.getElementById('colorError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('colorError').style.display = 'none';
            }

            if (!gender) {
                document.getElementById('genderError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('genderError').style.display = 'none';
            }

            if (!grade) {
                document.getElementById('gradeError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('gradeError').style.display = 'none';
            }

            if (!classLetter) {
                document.getElementById('classError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('classError').style.display = 'none';
            }

            if (name.length < 3) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('nameError').style.display = 'none';
            }

            if (!email.includes('@')) {
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('emailError').style.display = 'none';
            }

            if (isValid) {
                // Hier können Sie die Bestellung absenden, z.B. via EmailJS
                alert('Bestellung erfolgreich!');
                closeModal();
            }
        });
    </script>
</body>
</html>
